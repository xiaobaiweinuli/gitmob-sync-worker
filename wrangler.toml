name                  = "gitmob-sync-worker"
main                  = "src/index.ts"
compatibility_date    = "2026-06-03"
compatibility_flags   = ["nodejs_compat"]

# 自定义域名（可选，部署后在 Cloudflare 控制台配置）
# routes = [{ pattern = "sync.yourdomain.com", custom_domain = true }]
# ── 静态资源（logo.png 等，由边缘网络直接分发）──────────────────────────────
[assets]
directory = "./public"
# ── D1 数据库 ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding      = "DB"
database_name = "gitmob-sync-db"
database_id  = "b131ca68-bcf5-4cca-9765-c51eeb0a3bc1"   # 执行 `wrangler d1 create gitmob-sync-db` 后填入

# ── Durable Objects ────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "FAV_SYNC_DO"
class_name = "FavSyncDO"

[[migrations]]
tag         = "v1"
new_sqlite_classes = ["FavSyncDO"]

# ── 环境变量（明文，非敏感）────────────────────────────────────────────────
[vars]
WORKER_VERSION = "1.0"

# ── Secrets（通过 wrangler secret put 设置，不写在此文件）──────────────────
# 同步 Worker 无需 GITHUB_CLIENT_SECRET，认证方式为用户 token 直接验证

# ── 预览环境（wrangler dev）────────────────────────────────────────────────
[env.preview]
vars = { WORKER_VERSION = "1.0-preview" }
